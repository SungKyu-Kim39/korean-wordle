<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 단어</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --tile-bg: transparent;
            --tile-border: #3a3a3c;
            --key-bg: #3a3a3c;
            --key-text: #ffffff;
            --correct-bg: #a3e6aa; /* 초록색 */
            --present-bg: #f5d675; /* 주황/노란색 */
            --absent-bg: #818384;  /* 회색 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .tile {
            width: 50px;
            height: 50px;
            border: 2px solid var(--tile-border);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #keyboard {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            background-color: #222;
            border-radius: 20px 20px 0 0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .key {
            background-color: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 6px;
            padding: 15px 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        .key.wide {
            flex: 1.5;
        }

        .key.enter {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            background-color: #333;
        }

        /* 팝업 모달 스타일 */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .modal-content h2 { margin-top: 0; }
        .modal-content button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: var(--correct-bg);
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>오늘의 단어</h1>

    <div id="board"></div>

    <div id="keyboard">
        <div class="keyboard-row">
            <button class="key" data-key="ㅂ">ㅂ</button>
            <button class="key" data-key="ㅈ">ㅈ</button>
            <button class="key" data-key="ㄷ">ㄷ</button>
            <button class="key" data-key="ㄱ">ㄱ</button>
            <button class="key" data-key="ㅅ">ㅅ</button>
            <button class="key" data-key="ㅛ">ㅛ</button>
            <button class="key" data-key="ㅕ">ㅕ</button>
            <button class="key" data-key="ㅑ">ㅑ</button>
            <button class="key wide" data-key="BACKSPACE">←</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="ㅁ">ㅁ</button>
            <button class="key" data-key="ㄴ">ㄴ</button>
            <button class="key" data-key="ㅇ">ㅇ</button>
            <button class="key" data-key="ㄹ">ㄹ</button>
            <button class="key" data-key="ㅎ">ㅎ</button>
            <button class="key" data-key="ㅗ">ㅗ</button>
            <button class="key" data-key="ㅓ">ㅓ</button>
            <button class="key" data-key="ㅏ">ㅏ</button>
            <button class="key" data-key="ㅣ">ㅣ</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="ㅋ">ㅋ</button>
            <button class="key" data-key="ㅌ">ㅌ</button>
            <button class="key" data-key="ㅊ">ㅊ</button>
            <button class="key" data-key="ㅍ">ㅍ</button>
            <button class="key" data-key="ㅠ">ㅠ</button>
            <button class="key" data-key="ㅜ">ㅜ</button>
            <button class="key" data-key="ㅡ">ㅡ</button>
        </div>
        <button class="key enter" data-key="ENTER">글자를 입력하세요</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">결과</h2>
            <p id="modal-message"></p>
            <button onclick="resetGame()">다시 시작하기</button>
        </div>
    </div>

    <script>
        // 사전 데이터 (자모 5개로 이루어진 단어들)
        const dictionary = [
            "ㄱㅏㅁㅈㅏ", "ㅅㅏㄹㅏㅁ", "ㅎㅏㄴㅡㄹ", "ㅇㅜㅅㅏㄴ", "ㅁㅏㅇㅡㅁ",
            "ㄱㅏㅈㅗㄱ", "ㅊㅣㄴㄱㅜ", "ㅇㅓㅁㅁㅏ", "ㅎㅏㄱㄱㅛ", "ㄴㅏㅁㅈㅏ",
            "ㄹㅏㅁㅕㄴ", "ㅂㅏㄹㅏㅁ", "ㅅㅣㄱㄱㅜ", "ㄴㅐㅁㅂㅣ", "ㄴㅏㅁㅜ"
        ];

        const MAX_ATTEMPTS = 5;
        const WORD_LENGTH = 5;

        let targetWord = "";
        let currentAttempt = 0;
        let currentTile = 0;
        let guesses = Array(MAX_ATTEMPTS).fill().map(() => Array(WORD_LENGTH).fill(""));

        // 게임 초기화 함수
        function initGame() {
            targetWord = dictionary[Math.floor(Math.random() * dictionary.length)];
            currentAttempt = 0;
            currentTile = 0;
            guesses = Array(MAX_ATTEMPTS).fill().map(() => Array(WORD_LENGTH).fill(""));
            
            drawBoard();
            resetKeyboardColors();
            document.getElementById("modal").style.display = "none";
        }

        // 보드 그리기
        function drawBoard() {
            const board = document.getElementById("board");
            board.innerHTML = "";
            for (let r = 0; r < MAX_ATTEMPTS; r++) {
                const row = document.createElement("div");
                row.className = "row";
                for (let c = 0; c < WORD_LENGTH; c++) {
                    const tile = document.createElement("div");
                    tile.className = "tile";
                    tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        // 보드 업데이트
        function updateBoard() {
            for (let r = 0; r < MAX_ATTEMPTS; r++) {
                for (let c = 0; c < WORD_LENGTH; c++) {
                    const tile = document.getElementById(`tile-${r}-${c}`);
                    tile.textContent = guesses[r][c];
                }
            }
        }

        // 키보드 이벤트 연결
        document.querySelectorAll(".key").forEach(button => {
            button.addEventListener("click", () => {
                handleInput(button.dataset.key);
            });
        });

        // 입력 처리 로직
        function handleInput(key) {
            if (key === "BACKSPACE") {
                if (currentTile > 0) {
                    currentTile--;
                    guesses[currentAttempt][currentTile] = "";
                }
            } else if (key === "ENTER") {
                checkGuess();
            } else {
                if (currentTile < WORD_LENGTH) {
                    guesses[currentAttempt][currentTile] = key;
                    currentTile++;
                }
            }
            updateBoard();
        }

        // 정답 확인 로직
        function checkGuess() {
            if (currentTile !== WORD_LENGTH) {
                alert("다섯 글자를 모두 입력해주세요.");
                return;
            }

            const currentGuess = guesses[currentAttempt].join("");

            const targetArray = targetWord.split("");
            const guessArray = guesses[currentAttempt];
            let tileColors = Array(WORD_LENGTH).fill("var(--absent-bg)");
            let targetJamoCounts = {};

            // 정답의 자모 개수 카운트
            for (let jamo of targetArray) {
                targetJamoCounts[jamo] = (targetJamoCounts[jamo] || 0) + 1;
            }

            // 1차 패스: 정확한 위치 (초록색)
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessArray[i] === targetArray[i]) {
                    tileColors[i] = "var(--correct-bg)";
                    targetJamoCounts[guessArray[i]]--;
                }
            }

            // 2차 패스: 잘못된 위치 (주황/노란색)
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (tileColors[i] === "var(--absent-bg)" && targetJamoCounts[guessArray[i]] > 0) {
                    tileColors[i] = "var(--present-bg)";
                    targetJamoCounts[guessArray[i]]--;
                }
            }

            // UI 색상 업데이트 (타일 및 키보드)
            for (let i = 0; i < WORD_LENGTH; i++) {
                const tile = document.getElementById(`tile-${currentAttempt}-${i}`);
                tile.style.backgroundColor = tileColors[i];
                tile.style.borderColor = tileColors[i];
                if (tileColors[i] !== "var(--present-bg)") tile.style.color = "#000";

                updateKeyboardColor(guessArray[i], tileColors[i]);
            }

            // 게임 종료 조건 확인
            if (currentGuess === targetWord) {
                setTimeout(() => showModal("성공!", "정답을 맞췄습니다!"), 300);
            } else if (currentAttempt === MAX_ATTEMPTS - 1) {
                setTimeout(() => showModal("실패...", `정답은 '${targetWord}' 였습니다.`), 300);
            } else {
                currentAttempt++;
                currentTile = 0;
            }
        }

        // 키보드 색상 업데이트
        function updateKeyboardColor(key, color) {
            const keyButton = document.querySelector(`.key[data-key="${key}"]`);
            if (!keyButton) return;

            const currentColor = keyButton.style.backgroundColor;
            // 이미 초록색인 키는 덮어쓰지 않음
            if (currentColor !== "var(--correct-bg)") {
                keyButton.style.backgroundColor = color;
                keyButton.style.color = "#000";
            }
        }

        function resetKeyboardColors() {
            document.querySelectorAll(".key").forEach(button => {
                if(button.dataset.key !== "ENTER") {
                    button.style.backgroundColor = "var(--key-bg)";
                    button.style.color = "var(--key-text)";
                }
            });
        }

        function showModal(title, message) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-message").innerText = message;
            document.getElementById("modal").style.display = "flex";
        }

        function resetGame() {
            initGame();
        }

        // 최초 실행
        initGame();
    </script>
</body>
</html>
