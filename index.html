<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 단어 - 한글 워들</title>
    <style>
        :root {
            --bg-color: #121213;
            --tile-border: #3a3a3c;
            --tile-empty: #121213;
            --correct: #6aaa64;
            --present: #c9b458;
            --absent: #3a3a3c;
            --key-bg: #818384;
            --text-color: #ffffff;
        }
        /* ... (중략: 기존 스타일 동일하게 유지) ... */
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        header { width: 100%; height: 60px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--tile-border); font-weight: 800; font-size: 1.4rem; }
        #game-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; max-width: 500px; }
        #board { display: grid; grid-template-rows: repeat(5, 1fr); gap: 8px; padding: 10px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .tile { width: 58px; height: 58px; border: 2px solid var(--tile-border); display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; border-radius: 4px; transition: transform 0.1s ease, background-color 0.4s ease; }
        .tile[data-state="correct"] { background-color: var(--correct); border-color: var(--correct); color: white; }
        .tile[data-state="present"] { background-color: var(--present); border-color: var(--present); color: white; }
        .tile[data-state="absent"] { background-color: var(--absent); border-color: var(--absent); color: white; }
        .tile.populated { border-color: #565758; transform: scale(1.05); }
        #keyboard { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        .keyboard-row { display: flex; justify-content: center; margin-bottom: 8px; }
        .key { background-color: var(--key-bg); border: none; border-radius: 4px; margin: 0 3px; height: 58px; flex-grow: 1; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; cursor: pointer; }
        .key.large { flex-grow: 1.8; }
        .key[data-state="correct"] { background-color: var(--correct); }
        .key[data-state="present"] { background-color: var(--present); }
        .key[data-state="absent"] { background-color: var(--absent); }
        #submit-btn { width: calc(100% - 20px); max-width: 480px; background-color: #3a3a3c; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 30px; }
        #submit-btn.ready { background-color: var(--correct); }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #1a1a1b; padding: 30px; border-radius: 16px; text-align: center; border: 1px solid var(--tile-border); width: 80%; max-width: 320px; }
        .modal button { background: var(--correct); border: none; padding: 12px 24px; color: white; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <header>오늘의 단어</header>
    <div id="game-container"><div id="board"></div></div>
    <div id="keyboard">
        <div class="keyboard-row">
            <button class="key" data-key="ㅂ">ㅂ</button><button class="key" data-key="ㅈ">ㅈ</button><button class="key" data-key="ㄷ">ㄷ</button><button class="key" data-key="ㄱ">ㄱ</button><button class="key" data-key="ㅅ">ㅅ</button><button class="key" data-key="ㅛ">ㅛ</button><button class="key" data-key="ㅕ">ㅕ</button><button class="key" data-key="ㅑ">ㅑ</button><button class="key large" data-key="BACK">삭제</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="ㅁ">ㅁ</button><button class="key" data-key="ㄴ">ㄴ</button><button class="key" data-key="ㅇ">ㅇ</button><button class="key" data-key="ㄹ">ㄹ</button><button class="key" data-key="ㅎ">ㅎ</button><button class="key" data-key="ㅗ">ㅗ</button><button class="key" data-key="ㅓ">ㅓ</button><button class="key" data-key="ㅏ">ㅏ</button><button class="key" data-key="ㅣ">ㅣ</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="ㅋ">ㅋ</button><button class="key" data-key="ㅌ">ㅌ</button><button class="key" data-key="ㅊ">ㅊ</button><button class="key" data-key="ㅍ">ㅍ</button><button class="key" data-key="ㅠ">ㅠ</button><button class="key" data-key="ㅜ">ㅜ</button><button class="key" data-key="ㅡ">ㅡ</button>
        </div>
    </div>
    <button id="submit-btn">단어를 불러오는 중...</button>
    <div id="modal-overlay"><div class="modal"><h2 id="modal-title">결과</h2><p id="modal-msg"></p><button onclick="resetGame()">다시 도전하기</button></div></div>

    <script>
        let wordDatabase = {};
        let targetList = [];
        let targetWord = "";
        let currentGuess = "";
        let attempts = [];
        let gameOver = false;

        const boardEl = document.getElementById('board');
        const submitBtn = document.getElementById('submit-btn');

        // JSON 파일로부터 데이터 로드
        async function loadWordDatabase() {
            try {
                const response = await fetch('words.json');
                if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                wordDatabase = await response.json();
                targetList = Object.keys(wordDatabase);
                initGame();
            } catch (error) {
                console.error('Error loading words:', error);
                submitBtn.textContent = "데이터 로딩 실패";
                alert('단어 데이터 로딩에 실패했습니다. words.json 파일이 같은 경로에 있는지 확인해주세요.');
            }
        }

        function initGame() {
            if (targetList.length === 0) return;
            gameOver = false;
            attempts = [];
            currentGuess = "";
            targetWord = targetList[Math.floor(Math.random() * targetList.length)];
            
            boardEl.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `tile-${i}-${j}`;
                    row.appendChild(tile);
                }
                boardEl.appendChild(row);
            }
            
            document.querySelectorAll('.key').forEach(k => { k.removeAttribute('data-state'); k.style.color = "white"; });
            submitBtn.textContent = "글자를 입력하세요";
            submitBtn.classList.remove('ready');
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function updateBoard() {
            const rowIdx = attempts.length;
            const rowTiles = document.querySelectorAll('.row')[rowIdx].children;
            for (let i = 0; i < 5; i++) {
                const tile = rowTiles[i];
                if (currentGuess[i]) { tile.textContent = currentGuess[i]; tile.classList.add('populated'); } 
                else { tile.textContent = ""; tile.classList.remove('populated'); }
            }
            if (currentGuess.length === 5) { submitBtn.textContent = "제출하기 (Enter)"; submitBtn.classList.add('ready'); } 
            else { submitBtn.textContent = "글자를 입력하세요"; submitBtn.classList.remove('ready'); }
        }

        function handleKey(key) {
            if (gameOver) return;
            if (key === 'BACK') currentGuess = currentGuess.slice(0, -1);
            else if (currentGuess.length < 5) currentGuess += key;
            updateBoard();
        }

        function submitGuess() {
            if (currentGuess.length < 5 || gameOver) return;
            const rowIdx = attempts.length;
            const rowTiles = document.querySelectorAll('.row')[rowIdx].children;
            const targetArr = targetWord.split('');
            const guessArr = currentGuess.split('');
            const states = Array(5).fill('absent');
            const targetCounter = {};
            targetArr.forEach(l => targetCounter[l] = (targetCounter[l] || 0) + 1);

            guessArr.forEach((letter, i) => { if (letter === targetArr[i]) { states[i] = 'correct'; targetCounter[letter]--; } });
            guessArr.forEach((letter, i) => { if (states[i] === 'absent' && targetCounter[letter] > 0) { states[i] = 'present'; targetCounter[letter]--; } });

            states.forEach((state, i) => {
                setTimeout(() => {
                    const tile = rowTiles[i];
                    tile.setAttribute('data-state', state);
                    updateKeyUI(guessArr[i], state);
                }, i * 150);
            });

            attempts.push(currentGuess);
            if (currentGuess === targetWord) { gameOver = true; setTimeout(() => showResult(true), 1000); } 
            else if (attempts.length === 5) { gameOver = true; setTimeout(() => showResult(false), 1000); } 
            else { currentGuess = ""; setTimeout(() => { submitBtn.textContent = "글자를 입력하세요"; submitBtn.classList.remove('ready'); }, 800); }
        }

        function updateKeyUI(letter, state) {
            const keyEl = document.querySelector(`.key[data-key="${letter}"]`);
            if (!keyEl) return;
            const currentState = keyEl.getAttribute('data-state');
            if (currentState === 'correct') return;
            if (currentState === 'present' && state === 'absent') return;
            keyEl.setAttribute('data-state', state);
        }

        function showResult(isWin) {
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const msg = document.getElementById('modal-msg');
            overlay.style.display = 'flex';
            if (isWin) { title.textContent = "축하합니다!"; msg.textContent = `정답 '${wordDatabase[targetWord]}'을(를) 맞췄습니다!`; } 
            else { title.textContent = "아쉬워요..."; msg.textContent = `정답은 '${wordDatabase[targetWord]}' 였습니다.`; }
        }

        function resetGame() { initGame(); }

        document.querySelectorAll('.key').forEach(key => key.addEventListener('click', () => handleKey(key.dataset.key)));
        submitBtn.addEventListener('click', submitGuess);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitGuess();
            if (e.key === 'Backspace') handleKey('BACK');
            const k = e.key;
            if ("ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎㅏㅑㅓㅕㅗㅛㅜㅠㅡㅣ".includes(k)) handleKey(k);
        });

        loadWordDatabase();
    </script>
</body>
</html>
